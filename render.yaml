services:
  # Streamlit Web UI
  - type: web
    name: studyband-ui
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: streamlit run app.py --server.port $PORT --server.headless true --server.enableCORS false
    envVars:
      - key: GROQ_API_KEY
        sync: false
      - key: BAND_ROOM_ID
        sync: false
      - key: GROQ_MODEL
        value: llama-3.1-8b-instant
      - key: AIMLAPI_API_KEY
        sync: false
    plan: free

  # AI Agents Background Worker
  - type: worker
    name: studyband-agents
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: python run_agents.py
    envVars:
      - key: GROQ_API_KEY
        sync: false
      - key: BAND_ROOM_ID
        sync: false
      - key: GROQ_MODEL
        value: llama-3.1-8b-instant
      - key: AIMLAPI_API_KEY
        sync: false
    plan: free
